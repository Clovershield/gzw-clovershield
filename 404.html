<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page introuvable — GZW Clovershield</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230d0f0a'/><path d='M50 15 L65 40 L50 85 L35 40 Z' fill='%23d4820a'/><circle cx='50' cy='35' r='10' fill='%23e8dcc8'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--amber:#d4820a;--night:#0d0f0a;--paper:#e8dcc8;--sand:#c8b89a;--rust:#9b3a1a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--night);color:var(--sand);font-family:'Barlow',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;}
h1{font-family:'Bebas Neue',sans-serif;font-size:8rem;color:var(--amber);line-height:1;}
p{font-family:'Share Tech Mono',monospace;font-size:0.7rem;letter-spacing:0.3em;color:var(--rust);margin:1rem 0 2rem;}
a{font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:0.25em;color:var(--amber);text-decoration:none;border:1px solid var(--amber);padding:0.8rem 1.5rem;}
a:hover{background:var(--amber);color:var(--night);}
</style>
</head>
<body>
<div>
  <h1>404</h1>
  <p>⬛ SECTEUR INTROUVABLE — CETTE ZONE N'EXISTE PAS SUR LA CARTE ⬛</p>
  <a href="index.html">← RETOUR AU MANUEL</a>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var panel = document.getElementById('nav-search-panel');
  var inp = document.getElementById('nav-search-input');
  var res = document.getElementById('nav-search-results');
  var btn = document.getElementById('nav-search-btn');
  var cls = document.getElementById('nav-search-close');
  if (!panel || !inp) return;

  function openPanel() { panel.classList.add('open'); setTimeout(function(){ inp.focus(); }, 50); }
  function closePanel() { panel.classList.remove('open'); inp.value = ''; res.innerHTML = ''; }

  if (btn) btn.addEventListener('click', openPanel);
  if (cls) cls.addEventListener('click', closePanel);
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePanel(); });

  function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
  function highlight(t, q) { return q ? t.replace(new RegExp('(' + escRe(q) + ')', 'gi'), '<mark>$1</mark>') : t; }
  function excerpt(t, q) {
    var idx = q ? t.toLowerCase().indexOf(q.toLowerCase()) : -1;
    var s = idx > 60 ? idx - 60 : 0;
    return (s > 0 ? '…' : '') + t.slice(s, s + 160) + '…';
  }

  inp.addEventListener('input', function() {
    var q = this.value.trim();
    res.innerHTML = '';
    if (!q || q.length < 2) return;
    var index = (typeof SEARCH_INDEX !== 'undefined') ? SEARCH_INDEX : [];
    if (!index.length) {
      res.innerHTML = '<li class="nav-search-empty">⬛ INDEX NON CHARGÉ</li>';
      return;
    }
    var matches = index.filter(function(p) {
      return p.title.toLowerCase().includes(q.toLowerCase()) ||
             p.desc.toLowerCase().includes(q.toLowerCase()) ||
             p.text.toLowerCase().includes(q.toLowerCase());
    }).slice(0, 8);
    if (!matches.length) {
      res.innerHTML = '<li class="nav-search-empty">⬛ AUCUN RÉSULTAT POUR "' + q + '"</li>';
      return;
    }
    res.innerHTML = matches.map(function(p) {
      return '<li class="nav-sr-item"><a href="' + p.page + '">' +
        '<span class="nav-sr-page">' + p.page.replace('.html','').toUpperCase() + '</span>' +
        '<span><div class="nav-sr-title">' + highlight(p.title, q) + '</div>' +
        '<div class="nav-sr-excerpt">' + highlight(excerpt(p.text, q), q) + '</div></span>' +
        '</a></li>';
    }).join('');
  });
});
</script>
</body>
</html>
