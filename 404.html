<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page introuvable — GZW Clovershield</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230d0f0a'/><path d='M50 15 L65 40 L50 85 L35 40 Z' fill='%23d4820a'/><circle cx='50' cy='35' r='10' fill='%23e8dcc8'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--amber:#d4820a;--night:#0d0f0a;--paper:#e8dcc8;--sand:#c8b89a;--rust:#9b3a1a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--night);color:var(--sand);font-family:'Barlow',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;}
h1{font-family:'Bebas Neue',sans-serif;font-size:8rem;color:var(--amber);line-height:1;}
p{font-family:'Share Tech Mono',monospace;font-size:0.7rem;letter-spacing:0.3em;color:var(--rust);margin:1rem 0 2rem;}
a{font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:0.25em;color:var(--amber);text-decoration:none;border:1px solid var(--amber);padding:0.8rem 1.5rem;}
a:hover{background:var(--amber);color:var(--night);}

/* ── SEARCH HIGHLIGHT ─────────────────── */
mark.search-hl {
  background: rgba(212,130,10,0.35);
  color: var(--amber);
  border-radius: 2px;
  padding: 0 2px;
  outline: 1px solid rgba(212,130,10,0.5);
}

/* ── NAV ACTIVE IMPROVED ─────────────── */
nav a.active {
  color: var(--amber) !important;
  border-bottom: 2px solid var(--amber) !important;
  background: rgba(212,130,10,0.06);
}

/* ── PROGRESS BAR PULSE ─────────────── */
#progress-bar {
  position: fixed; top: 0; left: 0; height: 2px;
  background: var(--amber); width: 0%;
  z-index: 9998; transition: width 0.1s linear;
  box-shadow: 0 0 8px rgba(212,130,10,0.7);
}
#back-top {
  position: fixed; bottom: 2rem; right: 2rem;
  width: 2.8rem; height: 2.8rem;
  background: rgba(13,15,10,0.9);
  border: 1px solid var(--amber);
  color: var(--amber); font-family: 'Share Tech Mono', monospace;
  font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s; z-index: 500;
}
#back-top.visible { opacity: 1; pointer-events: all; }
#back-top:hover { background: var(--amber); color: var(--night); }
</style>
</head>
<body>
<div id="progress-bar"></div>
<button id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// On page load: if URL has ?q=..., highlight matches and scroll to first
(function() {
  var params = new URLSearchParams(window.location.search);
  var q = params.get('q');
  if (!q || q.length < 2) return;
  
  function walkText(node, callback) {
    if (node.nodeType === 3) { callback(node); return; }
    if (['SCRIPT','STYLE','NAV','FOOTER'].indexOf(node.tagName) !== -1) return;
    Array.from(node.childNodes).forEach(function(c) { walkText(c, callback); });
  }
  
  var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  var firstMark = null;
  
  walkText(document.body, function(textNode) {
    if (!re.test(textNode.textContent)) return;
    re.lastIndex = 0;
    var span = document.createElement('span');
    span.innerHTML = textNode.textContent.replace(re, '<mark class="search-hl">$1</mark>');
    textNode.parentNode.replaceChild(span, textNode);
    if (!firstMark) firstMark = span.querySelector('.search-hl');
  });
  
  if (firstMark) {
    setTimeout(function() {
      firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 200);
  }
})();
</script>
<div>
  <h1>404</h1>
  <p>⬛ SECTEUR INTROUVABLE — CETTE ZONE N'EXISTE PAS SUR LA CARTE ⬛</p>
  <a href="index.html">← RETOUR AU MANUEL</a>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('nav-search-btn');
  var inp = document.getElementById('nav-search-input');
  var res = document.getElementById('nav-search-results');
  var panel = document.getElementById('nav-search-panel');
  var cls = document.getElementById('nav-search-close');
  if (!btn) return;

  // Build panel dynamically if not present
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'nav-search-panel';
    panel.className = 'nav-search-panel';
    panel.innerHTML =
      '<div class="nav-search-row">' +
      '<span style="color:var(--amber);font-size:0.85rem;flex-shrink:0;">🔍</span>' +
      '<input class="nav-search-input" id="nav-search-input-inner" type="text" placeholder="▸ RECHERCHER DANS LE MANUEL..." autocomplete="off" spellcheck="false">' +
      '<button class="nav-search-close" id="nav-search-close-inner">✕ ESC</button>' +
      '</div><ul class="nav-search-results" id="nav-search-results-inner"></ul>';
    document.body.appendChild(panel);
    inp = document.getElementById('nav-search-input-inner');
    res = document.getElementById('nav-search-results-inner');
    cls = document.getElementById('nav-search-close-inner');
  }

  function openPanel() { panel.classList.add('open'); setTimeout(function(){ if(inp) inp.focus(); }, 50); }
  function closePanel() { panel.classList.remove('open'); if(inp){ inp.value=''; } if(res) res.innerHTML=''; }

  btn.addEventListener('click', openPanel);
  if (cls) cls.addEventListener('click', closePanel);
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closePanel(); });

  function escRe(s){ return s.replace(/[.*+?^${}()|[\\]\\]/g,'\\$&'); }
  function hi(t,q){ return q?t.replace(new RegExp('('+escRe(q)+')','gi'),'<mark>$1</mark>'):t; }
  function exrpt(t,q){
    var idx=q?t.toLowerCase().indexOf(q.toLowerCase()):-1;
    var s=idx>60?idx-60:0;
    return (s>0?'…':'')+t.slice(s,s+160)+'…';
  }

  if (inp) inp.addEventListener('input', function(){
    var q = this.value.trim();
    res.innerHTML = '';
    if (!q || q.length < 2) return;
    var index = (typeof SEARCH_INDEX !== 'undefined') ? SEARCH_INDEX : [];
    if (!index.length) {
      res.innerHTML = '<li class="nav-search-empty">⬛ INDEX NON CHARGÉ</li>';
      return;
    }
    var matches = index.filter(function(p){
      return p.title.toLowerCase().includes(q.toLowerCase()) ||
             p.desc.toLowerCase().includes(q.toLowerCase()) ||
             p.text.toLowerCase().includes(q.toLowerCase());
    }).slice(0, 8);
    if (!matches.length) {
      res.innerHTML = '<li class="nav-search-empty">⬛ AUCUN RÉSULTAT POUR "' + q + '"</li>';
      return;
    }
    // Build links with ?q= parameter for highlight on destination
    res.innerHTML = matches.map(function(p){
      var url = p.page + '?q=' + encodeURIComponent(q);
      return '<li class="nav-sr-item"><a href="' + url + '">' +
        '<span class="nav-sr-page">' + p.page.replace('.html','').toUpperCase() + '</span>' +
        '<span><div class="nav-sr-title">' + hi(p.title,q) + '</div>' +
        '<div class="nav-sr-excerpt">' + hi(exrpt(p.text,q),q) + '</div></span>' +
        '</a></li>';
    }).join('');
  });
});
</script>

<script>
// Active nav link — match current page
(function(){
  var page = window.location.pathname.split('/').pop() || 'index.html';
  if (!page.endsWith('.html')) page = 'index.html';
  document.querySelectorAll('nav a').forEach(function(a){
    var href = a.getAttribute('href');
    if (href === page) a.classList.add('active');
  });
})();
</script>
</body>
</html>
